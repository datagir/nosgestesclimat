### Rénovation Energétique ###

logement . propriétaire:
  question: Etes-vous propriétaire de votre logement ?
  icônes: 🏠
  par défaut: non
  
logement . rénovation énergétique:
  titre: J'améliore la performance énergétique de mon logement
  icônes: 🏠👷‍
  formule: logement . empreinte chauffage * gain rénovation
  description: |
    La rénovation énergétique de son logement permet de très forte économie d'énergie mais aussi financière qui plus est si vous vivez dans un logement mal isolé
    voire une passoire énergétique c'est à dire un logement aux étiquettes énergétiques de classe F ou G (on en trouve plus de 7 millions en France)
    Néanmoins, la rénovation énergétique de son longement est investissement souvent conséqent mais sachez qu'il existe de nombreuses aides à votre dispostion
    Plus d'infos ici : https://www.faire.gouv.fr/ 
  
logement . gain rénovation:
  formule: 39%
  note: gain énergétique moyen après rénovation (source ANAH)

logement . renovation énergétique BBC:
  titre: J'améliore la performance énergétique de mon logement (labellisation BBC)
  icônes: 🏠👷‍
  formule: logement . empreinte chauffage * gain rénovation BBC
  description: |
    Une rénovation labellisé Batiment Basse Consommation (BBC) peut permettre de réduire jusqu’à 70 % la consommation d’énergie de son logement. Ce type de 
    rénovation permet également, sur le long terme, de forte économie financière qui plus est si vous vivez dans un logement mal isolé voire une passoire énergétique
    c'est à dire un logement aux étiquettes énergétiques de classe F ou G (on en trouve plus de 7 millions en France)
    Néanmoins, la rénovation énergétique de son longement est investissement souvent conséqent mais sachez qu'il existe de nombreuses aides à votre dispostion
    Plus d'infos ici : https://www.faire.gouv.fr/ 
  
logement . gain rénovation BBC:
  formule: 70%
  note: gain énergétique maximal atteinte après une rénovation BBC (source)

### Eclairage ### 
logement . éclairage LED:
  titre: J'installe des ampoules LED dans mon logement
  icônes: 🏠💡
  formule: empreinte éclairage * gains LED
  description: |
    Les lampes LED consomment très peu d’électricité et ont une très longue durée de vie (jusqu’à 40 000 heures) ce qui compensent leur prix plus élevé à l'achat.
    Pour faire le bon choix en matière d'éclairage, aidez-vous de l'étiquette énergétique et n'hésitez pas à consulter ce petit guide :
    https://www.ademe.fr/sites/default/files/assets/documents/guide-pratique-choisir-son-eclairage.pdf
      
logement . gains LED:
  formule: 80%
  note: réduction de consommation induite par une LED (vis à vis d'une ampoule normale)
  https://www.ademe.fr/sites/default/files/assets/documents/guide-pratique-reduire-facture-electricite.pdf

logement . empreinte éclairage:
  formule: électricité * part éclairage

logement . part éclairage:
  formule: 5.6%
  note: coeff 5.6 tiré de p3 https://www.ademe.fr/sites/default/files/assets/documents/guide-pratique-reduire-facture-electricite.pdf depuis les données RTE

### Sèche linge ### 

#prérequis : que l'utilisateur soit propriétaire --> envisager de créer une question post-calculateur : "Etes vous propriétaire de votre logement"  

logement . électricité . sechelinge:
  titres: Privilégier l'étendoir au sèche-linge 
  applicable si: sechelinge 
  #quand on aura une sélection de l'électroménager à l'instar des équipements électroniques
  effort: faible
  icônes: 👔👗
  formule: (400 * électricité . intensité carbone)
  # 400 : Valeur arbitraire intermédiaire, sur la base des kWh annum donnés par différents constructeurs. Les valeurs vont de 300 à 500+ kWh annum --> j'ai choisi 400 kWh
  description: |
    Ne pas utiliser son sèche-linge pour faire sécher son linge c'est de l'énergie économisée. Cela permet aussi de préserver les habits qui durent ainsi plus longtemps

### Mutualiser son logement ### 
logement . mutualisation:
  titres: Prendre un ou plusieurs colocataire
  effort: conséquent
  icônes: 🏠🙆
  formule: logement . impact / (habitants + place libre)
  description: |
    Vivre à plusieurs permet de réduire l'empreinte carbone de son poste logement. Même si cette dernière sera un peu plus élevée avec un ou plusieurs colocataires,
    de très nombreux impacts seront en réalité mutualisés (éclairage, chauffage, cuisson, etc.). Cela permet au final de réduire son empreinte carbone individuelle. 

